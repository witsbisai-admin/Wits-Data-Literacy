# ═══════════════════════════════════════════════════════════════
#  Wits Data Literacy Platform — Nginx Virtual Host
#
#  SETUP:
#  1. Change `server_name` to your actual domain
#  2. Run Certbot for SSL (see deployment guide)
#  3. Uncomment the HTTPS server block and SSL lines
# ═══════════════════════════════════════════════════════════════

# Rate limiting: 30 requests/minute per IP
limit_req_zone $binary_remote_addr zone=wits_limit:10m rate=30r/m;

# ── HTTP server ──────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;   # CHANGE TO: your-domain.wits.ac.za

    root  /usr/share/nginx/html;   # Docker path
    # root /var/www/wits-platform; # Bare nginx path (Option B)
    index index.html;

    # ── Redirect HTTP → HTTPS (enable after SSL is configured) ──
    # return 301 https://$host$request_uri;

    # ── Health check endpoint ────────────────────────────────────
    location /health {
        access_log  off;
        add_header  Content-Type text/plain;
        return 200  "healthy\n";
    }

    # ── Main SPA ─────────────────────────────────────────────────
    location / {
        limit_req zone=wits_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;

        # Always revalidate HTML (users get latest version)
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma        "no-cache"                  always;

        # Content Security Policy
        # Allows: self, inline scripts/styles, Google Fonts
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    }

    # ── Block hidden files (.git, .env, etc.) ────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    error_page 404 500 502 503 504 /index.html;
}

